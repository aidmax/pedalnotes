<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>PedalNotes - Training Journal for Cyclists</title>
    <meta name="description" content="A free, privacy-first training journal for cyclists. Log structured workout reflections in markdown — your body is the most important sensor." />
    <!-- Favicon for modern browsers -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <!-- PNG fallbacks for browsers that don't support SVG favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=2" />
    <!-- Classic favicon.ico for older browsers -->
    <link rel="shortcut icon" href="/favicon.ico?v=2" />
    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- PWA meta -->
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PedalNotes" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          if (stored === "dark") {
            document.documentElement.classList.add("dark");
          } else if (!stored && window.matchMedia("(prefers-color-scheme: dark)").matches) {
            document.documentElement.classList.add("dark");
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
